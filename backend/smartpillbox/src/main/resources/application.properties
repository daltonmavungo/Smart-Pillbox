# =============================================
# SMART PILLBOX - APPLICATION PROPERTIES
# =============================================

# Server
server.port=8080
server.servlet.context-path=/api

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smartpillbox
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=SmartPillBox2024SecretKeyVeryLongAndSecureKeyForJWTSigning!@#$
app.jwt.expiration=86400000

# Mail (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu_email@gmail.com
spring.mail.password=sua_senha_app
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# MQTT
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=smartpillbox-server
mqtt.topic.alarm=pillbox/alarm
mqtt.topic.confirm=pillbox/confirm
mqtt.topic.sync=pillbox/sync

# Alerta de esquecimento (minutos)
app.alert.timeout.minutes=30

# Logging
logging.level.com.smartpillbox=DEBUG
logging.level.org.springframework.security=INFO

